# Main Categories GUI configuration
gui:
  title: "<shadow:#000000FF><gold><bold>Shop</bold></gold></shadow>"
  rows: 6

  # Slot (0-indexed) in the Categories GUI reserved for the QuickSell button
  quicksell-slot: 49

  # Optional: filler item for empty slots
  filler:
    enabled: true
    material: GRAY_STAINED_GLASS_PANE
    name: " "
    hide-tooltip: true

  # Navigation / decorative buttons
  quicksell-button:
    material: HOPPER
    name: "<yellow><bold>Quick Sell</bold></yellow>"
    lore:
      - "<gray>Click with an item to quickly sell it."
      - "<gray>Click with an empty hand to open"
      - "<gray>the Quick Sell inventory browser."

# Categories to display in the GUI.
# Each key is the category id and must match a file in the categories/ folder.
categories:
  miner:
    slot: 10
    material: DIAMOND
    name: "<green>Miner"
    lore:
      - "<gray>Ores, mining blocks."

  farmer:
    slot: 11
    material: WHEAT
    name: "<aqua>Farming"
    lore:
      - "<gray>Crops and farming items."

  hunter:
    slot: 12
    material: ROTTEN_FLESH
    name: "<red>Hunter"
    lore:
      - "<gray>Mob loot and drops."

  woodcutter:
    slot: 13
    material: OAK_LOG
    name: "<aqua>Woodcutter"
    lore:
      - "<gray>Wood, logs and leaves."

  fisher:
    slot: 14
    material: FISHING_ROD
    name: "<blue>Fisher"
    lore:
      - "<gray>Fish and fishing-related items."
  
  adventurer:
    slot: 15
    material: ENDER_CHEST
    name: "<dark_purple>Adventurer"
    lore:
      - "<gray>Exploration and adventure items."
