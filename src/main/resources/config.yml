# BasicShop Configuration
# All display strings support MiniMessage formatting: https://docs.advntr.dev/minimessage/format.html

# Command names
# Changes here require a server restart to take effect (Brigadier commands are registered once at startup).
commands:
  # The root command (e.g. /shop). Change this if another plugin already claims /shop.
  root: shop
  # Additional aliases for the root command.
  aliases:
    - bs
    - basicshop
  # Sub-command names. Rename them to whatever you like.
  subcommands:
    help: help
    reload: reload
    quicksell: quicksell
    quicksell-hand: hand
    quicksell-inventory: inventory
    give: give

# Shop tools — custom sell items given via /shop give
tools:
  money_staff:
    material: BLAZE_ROD
    name: "<gold>Money Staff"
    lore:
      - "<gray>Click a container to sell its contents."
    # Force the enchantment glint without applying real enchantments
    enchantment-glint-override: true
  money_hoe:
    material: GOLDEN_HOE
    name: "<gold>Money Hoe"
    lore:
      - "<gray>Break mature crops to sell drops and replant."
      - "<gray>Click air to toggle auto-sell."
    enchants:
      efficiency: 5
      unbreaking: 3
      fortune: 3
      mending: 1

# Global toggles
global:
  # Set to false to completely disable buying from the shop
  buying-enabled: true
  # Set to false to completely disable selling to the shop
  selling-enabled: true
  disabled-text: "<red>Disabled"
  # DecimalFormat pattern used to display prices
  number-format: "#,##0.00"
  # When true, items are shown in a modern bordered layout (rows 2-5, 7 items per row)
  modern-item-listing: true

# GUI and transaction sounds (Bukkit Sound enum names or namespaced keys like entity.experience_orb.pickup)
sounds:
  open-category:
    enabled: true
    sound: UI_BUTTON_CLICK
    volume: 1.0
    pitch: 1.2
  back-to-categories:
    enabled: true
    sound: UI_BUTTON_CLICK
    volume: 1.0
    pitch: 0.8
  gui-click:
    enabled: true
    sound: UI_BUTTON_CLICK
    volume: 0.8
    pitch: 1.0
  sell:
    enabled: true
    sound: ENTITY_EXPERIENCE_ORB_PICKUP
    volume: 0.5
    pitch: 1.2

# Player-facing messages (MiniMessage format)
messages:
  prefix: "<dark_gray>[<gold>BasicShop</gold>]</dark_gray> "

  no-permission: "<red>You do not have permission to do that."
  player-only: "<red>This command can only be used by players."
  reload-success: "<green>Configuration reloaded successfully."

  shop-buy-disabled: "<red>Buying is currently disabled."
  shop-sell-disabled: "<red>Selling is currently disabled."

  item-buy-disabled: "<red>This item cannot be bought."
  item-sell-disabled: "<red>This item cannot be sold."

  buy-success: "<green>You bought <white><amount>x <item></white> for <gold><price></gold>."
  sell-success: "<green>You sold <white><amount>x <item></white> for <gold><price></gold>."

  insufficient-funds: "<red>You do not have enough money. Required: <gold><price></gold>."
  not-enough-items: "<red>You do not have enough of that item to sell."

  no-sellable-items: "<yellow>You have no sellable items in your inventory."
  quicksell-hand-empty: "<yellow>You are not holding any item."
  quicksell-inventory-success: "<green>Sold all sellable items for a total of <gold><price></gold>."

  tool-staff-line: "<green>You sold <white><amount>x <item></white> for <gold><price></gold> with Money Staff."
  tool-hoe-success: "<green>Sold crop drops for <gold><price></gold> and replanted."
  tool-hoe-autosell-on: "<green>Auto-sell enabled."
  tool-hoe-autosell-off: "<yellow>Auto-sell disabled."

  give-success: "<green>Gave <white><amount>x <tool></white> to <white><player></white>."
  give-player-not-found: "<red>That player is not online."
  give-invalid-tool: "<red>Unknown tool. Use <white>money_staff</white> or <white>money_hoe</white>."

  vault-unavailable: "<red>Economy provider is unavailable. Please contact an administrator."

  unknown-item: "<red>That item is not configured in the shop."

# Category GUI — navigation buttons and bottom-row filler
category-gui:
  # Appended to the category name in the GUI title when multiple pages exist.
  # Placeholders: <page> (current page), <total> (total pages)
  page-format: " <gray>(<page>/<total>)"
  back-button:
    slot: 49
    material: BARRIER
    name: "<gray>\u2717 Back to Categories"
    lore: []
  prev-button:
    slot: 45
    material: ARROW
    name: "<gray>\u2190 Previous Page"
    lore: []
  next-button:
    slot: 53
    material: ARROW
    name: "<gray>Next Page \u2192"
    lore: []
  filler:
    enabled: true
    material: GRAY_STAINED_GLASS_PANE
    name: " "
    hide-tooltip: true

# Per-click actions in the category GUI.
# action: buy | sell
# amount: a positive integer, or 'all' (sell-only, sells the entire inventory stack)
actions:
  left-click:
    action: sell
    amount: 1
  shift-left-click:
    action: sell
    amount: 64
  right-click:
    action: buy
    amount: 1
  shift-right-click:
    action: buy
    amount: 64
  drop-key:
    action: sell
    amount: all

# Item display settings — applies to all items in every category GUI
item-display:
  # Display name for shop items.
  # Use <item> as the item's translatable in-game name component (localized per client).
  # Use "" (empty string) to fall back to Minecraft's default item tooltip name.
  name: "" #"<green>\u25A0 <item>"
  # Lore template. Placeholders:
  #   <price_buy>  — replaced with the buy price. Lines containing this are hidden when buying is disabled.
  #   <price_sell> — replaced with the sell price. Lines containing this are hidden when selling is disabled.
  #   <if_buy>     — marks a line as buy-conditional (hidden when buying is disabled); tag is stripped from output.
  #   <if_sell>    — marks a line as sell-conditional (hidden when selling is disabled); tag is stripped from output.
  lore:
    - "<gray>Buy: <gold><price_buy>"
    - "<gray>Sell: <gold><price_sell>"
    - ""
    - "<if_buy><dark_gray>Left click <white>Buy 1"
    - "<if_buy><dark_gray>Shift left click <white>Buy 64"
    - "<if_sell><dark_gray>Right click <white>Sell 1"
    - "<if_sell><dark_gray>Shift right click <white>Sell 64"
    - "<if_sell><dark_gray><key:key.drop> <white>Sell All"
